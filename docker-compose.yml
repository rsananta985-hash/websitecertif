version: '3.9'

services:
  # ── MySQL Database ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: certychain_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-certychain2024}
      MYSQL_DATABASE: ${MYSQL_DB:-certychain_db}
      MYSQL_USER: ${MYSQL_USER:-certychain}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-certychain_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Detection Service (Python FastAPI) ──────────────────────────────────
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: certychain_ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ai_service/model:/app/model      # persist trained pkl files
      - ./dataset:/app/../../dataset       # dataset images
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Go Backend API ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: certychain_server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_DSN: "${MYSQL_USER:-certychain}:${MYSQL_PASSWORD:-certychain_pass}@tcp(mysql:3306)/${MYSQL_DB:-certychain_db}?charset=utf8mb4&parseTime=True&loc=Local"
      JWT_SECRET: ${JWT_SECRET:-certychain-enterprise-secret-change-in-production}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-http://host.docker.internal:8545}
      PRIVATE_KEY: ${PRIVATE_KEY:-ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      AI_SERVICE_URL: http://ai_service:8001
      SERVER_PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80,http://localhost:3000,http://localhost:5173}
    depends_on:
      mysql:
        condition: service_healthy
      ai_service:
        condition: service_healthy

  # ── React Frontend (Nginx) ─────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: certychain_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: certychain_network
